<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-4xl mx-auto p-6">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">게시판</h1>
        <a href="write.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">글쓰기</a>
    </header>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-100 border-b">
                <tr>
                    <th class="p-4 text-gray-700 font-semibold">제목</th>
                    <th class="p-4 text-gray-700 font-semibold">작성자</th>
                    <th class="p-4 text-gray-700 font-semibold">조회수</th>
                    <th class="p-4 text-gray-700 font-semibold">작성일</th>
                </tr>
            </thead>
            <tbody id="posts-body" class="divide-y divide-gray-200">
                <tr>
                    <td colspan="4" class="p-8 text-center text-gray-500">데이터를 불러오는 중입니다...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Supabase 설정
    const SUPABASE_URL = 'https://gbgazkerfzjosdmofbbs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZ2F6a2VyZnpqb3NkbW9mYmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzg1MzksImV4cCI6MjA5OTg1NDUzOX0.ZfNl_gkJhb5hiyRGPLxf95VwAg6dgsK7_KZVDRIxxo4';
    
    // 변수명 충돌 방지를 위해 sbClient 사용
    const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchPosts() {
        const tbody = document.getElementById('posts-body');
        
        try {
            const { data, error } = await sbClient
                .from('posts')
                .select('id, title, nickname, views, created_at')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">등록된 게시글이 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(post => `
                <tr class="hover:bg-gray-50 cursor-pointer" onclick="location.href='view.html?id=${post.id}'">
                    <td class="p-4">${post.title}</td>
                    <td class="p-4">${post.nickname}</td>
                    <td class="p-4">${post.views}</td>
                    <td class="p-4">${new Date(post.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
            
        } catch (err) {
            console.error('데이터 로드 에러:', err);
            tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">데이터를 불러오지 못했습니다: ${err.message}</td></tr>`;
        }
    }

    // 페이지 로드 시 데이터 가져오기
    fetchPosts();
</script>

</body>
</html>
