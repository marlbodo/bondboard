<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-6">
<div class="max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold cursor-pointer" onclick="location.href='index.html'">게시판</h1>
        <div class="flex gap-4">
            <select id="limit-select" class="p-2 border rounded" onchange="changeLimit()">
                <option value="10">10개</option><option value="20">20개</option><option value="30">30개</option>
            </select>
            <a href="write.html" class="bg-blue-600 text-white px-4 py-2 rounded">글쓰기</a>
        </div>
    </header>
    <table class="w-full bg-white shadow rounded-lg overflow-hidden">
        <thead class="bg-gray-100">
            <tr class="text-left">
                <th class="p-4">제목</th>
                <th class="p-4 w-28">작성자</th>
                <th class="p-4 w-20 text-center">조회</th>
            </tr>
        </thead>
        <tbody id="posts-body"></tbody>
    </table>
    <div class="mt-6 flex justify-center gap-4">
        <button id="prev-btn" class="px-4 py-2 bg-gray-200 rounded disabled:opacity-30 disabled:cursor-not-allowed" onclick="movePage(-1)" disabled>이전</button>
        <span id="page-num" class="py-2">1 페이지</span>
        <button id="next-btn" class="px-4 py-2 bg-gray-200 rounded disabled:opacity-30 disabled:cursor-not-allowed" onclick="movePage(1)">다음</button>
    </div>
</div>
<script>
    const sb = supabase.createClient('https://gbgazkerfzjosdmofbbs.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZ2F6a2VyZnpqb3NkbW9mYmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzg1MzksImV4cCI6MjA5OTg1NDUzOX0.ZfNl_gkJhb5hiyRGPLxf95VwAg6dgsK7_KZVDRIxxo4');
    let page = 0, limit = 10;

    async function fetchPosts() {
        const { data } = await sb.from('posts').select('*').order('id', { ascending: false }).range(page * limit, (page + 1) * limit);
        
        const hasNext = data.length > limit;
        const displayData = hasNext ? data.slice(0, limit) : data;

        document.getElementById('posts-body').innerHTML = displayData.map(p => `
            <tr class="border-b hover:bg-gray-50 cursor-pointer" onclick="location.href='view.html?id=${p.id}'">
                <td class="p-4 font-medium">${p.title}</td>
                <td class="p-4 text-gray-600 text-sm">${p.nickname}</td>
                <td class="p-4 text-gray-500 text-sm text-center">${p.views}</td>
            </tr>`).join('');
        
        document.getElementById('page-num').innerText = `${page + 1} 페이지`;
        
        document.getElementById('prev-btn').disabled = (page === 0);
        document.getElementById('next-btn').disabled = !hasNext;
    }

    function movePage(d) { page += d; fetchPosts(); }
    function changeLimit() { limit = parseInt(document.getElementById('limit-select').value); page = 0; fetchPosts(); }
    fetchPosts();
</script>
</body>
</html>
