<!-- 댓글 영역 -->
    <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-bold text-slate-700 mb-6">댓글</h2>
        <div id="cs" class="space-y-4 mb-8"></div>
        
        <!-- 댓글 입력 폼 (우측 등록 버튼 배치) -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-1 space-y-2">
                <input type="text" id="cn" placeholder="닉네임" class="w-full p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none text-slate-700">
                <input type="password" id="cp" placeholder="비밀번호" class="w-full p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none text-slate-700">
            </div>
            <div class="md:col-span-3">
                <textarea id="cc" placeholder="댓글 내용을 입력하세요..." class="w-full h-24 p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none text-slate-700 resize-none"></textarea>
                <!-- 등록 버튼을 우측으로 배치 -->
                <div class="flex justify-end mt-2">
                    <button onclick="ac()" class="px-8 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition">댓글 등록</button>
                </div>
            </div>
        </div>
    </section>
