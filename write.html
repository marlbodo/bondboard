<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-6">
<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow space-y-4">
    <input type="text" id="title" placeholder="제목" class="w-full p-2 border rounded">
    <div class="flex gap-4">
        <input type="text" id="nick" placeholder="닉네임" class="w-1/2 p-2 border rounded">
        <input type="password" id="pw" placeholder="비밀번호" class="w-1/2 p-2 border rounded">
    </div>
    <textarea id="content" placeholder="내용" rows="10" class="w-full p-2 border rounded"></textarea>
    
    <!-- 파일 첨부 인풋 -->
    <div class="border-t pt-4">
        <label class="block text-sm font-bold mb-2">첨부파일</label>
        <input type="file" id="file" class="w-full">
    </div>
    
    <button onclick="save()" class="w-full py-3 bg-blue-600 text-white rounded hover:bg-blue-700">등록</button>
</div>

<script>
    const sb = supabase.createClient('https://gbgazkerfzjosdmofbbs.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZ2F6a2VyZnpqb3NkbW9mYmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzg1MzksImV4cCI6MjA5OTg1NDUzOX0.ZfNl_gkJhb5hiyRGPLxf95VwAg6dgsK7_KZVDRIxxo4');
    
    async function save() {
        const fileInput = document.getElementById('file');
        const file = fileInput.files[0];
        let url = null;

        // 파일이 선택되었을 경우 Supabase Storage에 업로드
        if (file) {
            // 한글, 공백, 특수문자로 인한 업로드 오류 방지를 위해 확장자만 추출하고 영문/숫자 기반 이름으로 생성
            const fileExt = file.name.includes('.') ? file.name.split('.').pop() : '';
            const safeFileName = `${Date.now()}_${Math.random().toString(36.substring(2, 9))}${fileExt ? '.' + fileExt : ''}`;
            
            // 원래 파일명(한글, 공백 포함)을 안전하게 인코딩해서 저장하거나, 
            // 업로드 시에는 safeFileName을 쓰고 다운로드 화면에서 원래 이름을 유추할 수 있도록 처리
            // 여기서는 서버에 올라가는 실제 파일명을 안전하게 처리합니다.
            const { data, error } = await sb.storage.from('uploads').upload(safeFileName, file);
            
            if (error) {
                alert('파일 업로드 실패: ' + error.message);
                return;
            }
            url = sb.storage.from('uploads').getPublicUrl(safeFileName).data.publicUrl;
        }

        // 게시글 데이터 삽입
        const { error } = await sb.from('posts').insert([{ 
            board_id: 1, 
            title: document.getElementById('title').value, 
            nickname: document.getElementById('nick').value, 
            password: document.getElementById('pw').value, 
            content: document.getElementById('content').value, 
            file_url: url 
        }]);

        if (error) {
            alert('글 등록 실패: ' + error.message);
        } else {
            location.href = 'index.html';
        }
    }
</script>
</body>
</html>
